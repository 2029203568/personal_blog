# 宝塔 / Nginx 示例：于洋洋技术博客（站点根目录按实际修改）
# 将 server { } 内 location 合并到你站点的配置，然后 nginx -t && nginx -s reload

# ── 方案 A（推荐）：视频由 Nginx 直接提供，Range 性能最好 ──
location ^~ /assets/videos/ {
    alias /www/wwwroot/网站/frontend/assets/videos/;   # 改成你的绝对路径

    add_header Accept-Ranges bytes always;
    add_header Access-Control-Allow-Origin *;

    # 若编译了 ngx_http_mp4_module（nginx -V 2>&1 | grep http_mp4_module）
    # location ~ \.mp4$ { mp4; }

    types {
        video/mp4 mp4;
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
    }
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    aio threads;
}

# ── 方案 B：全部反代到 uvicorn（务必透传 Range，关闭缓冲）──
location /assets/videos/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Range $http_range;
    proxy_set_header If-Range $http_if_range;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;
    add_header Accept-Ranges bytes always;
}

location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 宝塔 Python 项目：务必让 /api/ 也走反代，不要单独用静态目录覆盖整站
# 验证: curl -s http://127.0.0.1:8000/api/landing | head
# 若域名访问 /api/landing 404 而 8000 端口正常，说明 Nginx 未反代 API
